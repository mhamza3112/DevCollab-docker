services:
  backend:
    build: ./backend
    container_name: certificate-backend

    ports:
      - "5000:5000"

    environment:
      - PORT=5000
      - MONGO_URL=mongodb://mongo:27017/certificatedb

    depends_on:
      - mongo

    volumes:
      - ./backend:/app
      - /app/node_modules

  mongo:
    image: mongo:6
    container_name: certificate-mongo

    restart: always

    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:
